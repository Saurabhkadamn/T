# Kadal AI — local development dependencies
# Redis 7 (local) + API container — MongoDB uses Atlas (SRV string from .env)
# Run: docker-compose up --build

version: "3.9"

services:
  redis:
    image: redis:7-alpine
    container_name: kadal_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: kadal_api
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - REDIS_HOST=redis
    depends_on:
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  redis_data:
